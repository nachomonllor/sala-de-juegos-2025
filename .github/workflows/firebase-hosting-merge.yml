name: Deploy to Firebase Hosting (main)

on:
  push:
    branches:
      - main   # <- ahora sólo se deploya al pushear a main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build -- --configuration=production

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SALA_DE_JUEGOS_2025 }}
          channelId: live
          projectId: sala-de-juegos-2025
